version: '3.8'

services:
  ultra-chat-relay:
    build: .
    container_name: ultra-chat-relay
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      # Mount relay config directory
      - ./config:/data/.claude-relay

      # Mount user home directory for workspace access
      - /home/ubuntu:/workspace/ubuntu:rw
      - /home/ubuntu/projects:/workspace/projects:rw
      - /home/ubuntu/hscheema1979:/workspace/hscheema1979:rw
      - /home/ubuntu/hscheema1979/myhealthteam:/workspace/myhealthteam:rw

      # Mount relay code for development (optional, comment out for production)
      - ./:/relay:ro

    environment:
      - CLAUDE_RELAY_HOME=/data/.claude-relay
      - CLAUDECODE=
      - NODE_ENV=production

    networks:
      - ultra-chat-network

    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/info', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  ultra-chat-network:
    driver: bridge
